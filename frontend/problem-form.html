<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Problem — GreenGrid</title>
<link href="css/styles.css" rel="stylesheet">
<style>
  #monaco-container { height: 420px; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .notes-textarea { min-height: 160px; }
</style>
</head>
<body>

<div id="gg-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Add Problem</h3>
    <div class="d-flex gap-2">
      <span class="text-muted-gg mono" id="fetch-status" style="font-size:.8rem;"></span>
    </div>
  </div>

  <form id="problem-form">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="gg-card mb-3">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-gg">Problem Title *</label>
              <input type="text" class="form-control-gg" id="title" required placeholder="Two Sum">
            </div>
            <div class="col-md-6">
              <label class="form-label-gg">Platform *</label>
              <select class="form-select-gg" id="platform" required>
                <option value="LeetCode">LeetCode</option>
                <option value="HackerRank">HackerRank</option>
                <option value="Codeforces">Codeforces</option>
                <option value="CodeChef">CodeChef</option>
                <option value="AtCoder">AtCoder</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-gg">Problem URL</label>
              <input type="url" class="form-control-gg" id="problemUrl" placeholder="https://leetcode.com/problems/two-sum/">
            </div>
            <div class="col-md-6">
              <label class="form-label-gg">Difficulty *</label>
              <select class="form-select-gg" id="difficulty" required>
                <option value="EASY">Easy</option>
                <option value="MEDIUM">Medium</option>
                <option value="HARD">Hard</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label-gg">Language *</label>
              <select class="form-select-gg" id="language" required>
                <option value="Java">Java</option>
                <option value="Python">Python</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="C++">C++</option>
                <option value="C">C</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="Kotlin">Kotlin</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-gg">Topics</label>
              <div class="d-flex flex-wrap gap-2 mb-2" id="tag-chips"></div>
              <input type="text" class="form-control-gg" id="tag-input" placeholder="Type a topic and press Enter (e.g. Two Pointers)">
            </div>
          </div>
        </div>

        <div class="gg-card mb-3">
          <label class="form-label-gg">Code *</label>
          <div id="monaco-container"></div>
        </div>

        <div class="gg-card">
          <label class="form-label-gg">Notes (Markdown supported)</label>
          <textarea class="form-control-gg notes-textarea" id="notes" placeholder="Explain your approach…"></textarea>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="gg-card mb-3">
          <label class="form-label-gg">Time Complexity</label>
          <input type="text" class="form-control-gg mb-3" id="timeComplexity" placeholder="O(n)">
          <label class="form-label-gg">Space Complexity</label>
          <input type="text" class="form-control-gg" id="spaceComplexity" placeholder="O(1)">
        </div>

        <div class="gg-card mb-3">
          <label class="form-label-gg">Solved Date</label>
          <input type="date" class="form-control-gg" id="solvedDate">
        </div>

        <button type="submit" class="btn btn-gg-primary w-100" id="save-btn">Save & Commit to GitHub</button>
        <p class="text-muted-gg mt-2 mb-0" style="font-size:.78rem;">
          This will create <span class="mono" id="path-preview">Easy/Two Sum/</span> in your connected repository.
        </p>
      </div>
    </div>
  </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/shell.js"></script>
<script>
  GGShell.render('add-problem');

  document.getElementById('solvedDate').valueAsDate = new Date();

  let editor;
  const LANG_MAP = { Java: 'java', Python: 'python', JavaScript: 'javascript', TypeScript: 'typescript',
                      'C++': 'cpp', C: 'c', Go: 'go', Rust: 'rust', Kotlin: 'kotlin' };

  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
  require(['vs/editor/editor.main'], () => {
    editor = monaco.editor.create(document.getElementById('monaco-container'), {
      value: '',
      language: 'java',
      theme: 'vs-dark',
      fontSize: 14,
      minimap: { enabled: false },
      automaticLayout: true,
      padding: { top: 14 },
    });
  });

  document.getElementById('language').addEventListener('change', (e) => {
    if (editor) monaco.editor.setModelLanguage(editor.getModel(), LANG_MAP[e.target.value] || 'plaintext');
  });

  // --- Tags ---
  let tags = [];
  function renderTags() {
    document.getElementById('tag-chips').innerHTML = tags.map((t, i) => `
      <span class="tag-chip">${t}<button type="button" data-i="${i}">&times;</button></span>
    `).join('');
    document.querySelectorAll('.tag-chip button').forEach(b =>
      b.addEventListener('click', () => { tags.splice(+b.dataset.i, 1); renderTags(); }));
  }
  document.getElementById('tag-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = e.target.value.trim();
      if (v && !tags.includes(v)) { tags.push(v); renderTags(); }
      e.target.value = '';
    }
  });

  // --- Difficulty / title -> folder path preview ---
  function updatePathPreview() {
    const diff = document.getElementById('difficulty');
    const diffLabel = diff.options[diff.selectedIndex].text;
    const title = document.getElementById('title').value.trim() || 'Problem Title';
    document.getElementById('path-preview').textContent = `${diffLabel}/${title}/`;
  }
  document.getElementById('difficulty').addEventListener('change', updatePathPreview);
  document.getElementById('title').addEventListener('input', updatePathPreview);
  updatePathPreview();

  // --- LeetCode auto-fetch ---
  let fetchTimer;
  document.getElementById('problemUrl').addEventListener('input', (e) => {
    clearTimeout(fetchTimer);
    const url = e.target.value.trim();
    if (!url.includes('leetcode.com/problems/')) return;
    fetchTimer = setTimeout(() => fetchLeetCodeMetadata(url), 600);
  });

  async function fetchLeetCodeMetadata(url) {
    const statusEl = document.getElementById('fetch-status');
    statusEl.textContent = 'fetching problem metadata…';
    try {
      const res = await GGApi.get('/api/problems/fetch-metadata?url=' + encodeURIComponent(url));
      if (res.data.found) {
        if (res.data.title) document.getElementById('title').value = res.data.title;
        if (res.data.difficulty) document.getElementById('difficulty').value = res.data.difficulty;
        if (res.data.topics) { tags = [...new Set([...tags, ...res.data.topics])]; renderTags(); }
        document.getElementById('platform').value = 'LeetCode';
        updatePathPreview();
        statusEl.textContent = '✓ auto-filled from LeetCode';
      } else {
        statusEl.textContent = '';
      }
    } catch {
      statusEl.textContent = '';
    }
  }

  // --- Submit ---
  document.getElementById('problem-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    const code = editor ? editor.getValue().trim() : '';
    if (!code) { GGToast.error({ message: 'Please paste your solution code' }); return; }

    btn.disabled = true;
    btn.textContent = 'Saving & pushing to GitHub…';

    try {
      const payload = {
        platform: document.getElementById('platform').value,
        title: document.getElementById('title').value.trim(),
        problemUrl: document.getElementById('problemUrl').value.trim() || null,
        difficulty: document.getElementById('difficulty').value,
        topics: tags,
        language: document.getElementById('language').value,
        code,
        notes: document.getElementById('notes').value,
        timeComplexity: document.getElementById('timeComplexity').value,
        spaceComplexity: document.getElementById('spaceComplexity').value,
        solvedDate: document.getElementById('solvedDate').value,
      };
      const res = await GGApi.post('/api/problems', payload);

      if (res.data.commitStatus === 'COMMITTED') {
        GGToast.success('Saved and committed to GitHub!');
      } else {
        GGToast.show('Saved, but the GitHub push failed — you can retry from the problem later.', 'error');
      }
      window.location.href = 'dashboard.html';
    } catch (err) {
      GGToast.error(err);
      btn.disabled = false;
      btn.textContent = 'Save & Commit to GitHub';
    }
  });
</script>
</body>
</html>
