spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${PORT:8080}

greengrid:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:30}

  encryption:
    key: ${TOKEN_ENCRYPTION_KEY}

  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}

  frontend-url: ${FRONTEND_URL}
